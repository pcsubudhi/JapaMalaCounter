name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show all files
        run: find . -type f | grep -v ".git/" | sort

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: |
          SFILE=$(find . -name "settings.gradle" -not -path "./.git/*" | head -1)
          echo "Found settings.gradle at: $SFILE"
          if [ -z "$SFILE" ]; then
            echo "ERROR: No settings.gradle found!"
            echo "Files in repo:"
            find . -type f | grep -v ".git/"
            exit 1
          fi
          cd "$(dirname "$SFILE")"
          echo "Building in: $(pwd)"
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JapaMalaCounter-APK
          path: ./**/app-debug.apk
