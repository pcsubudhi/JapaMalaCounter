<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Japa Mala Counter - Hybrid</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 15px;
            overflow-x: hidden;
        }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 20px; color: #ffd700; }
        
        /* Counter Display */
        .counter-section {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        .mala-count { font-size: 4rem; font-weight: bold; color: #ffd700; }
        .word-count { font-size: 1.5rem; color: #aaa; margin-top: 5px; }
        .mantra-progress {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .bead {
            width: 20px; height: 20px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .bead.active { background: #ffd700; box-shadow: 0 0 10px #ffd700; }
        
        /* Audio Level Indicator */
        .audio-level {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .audio-level-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            width: 0%;
            transition: width 0.1s;
        }
        
        /* Status */
        .status-box {
            padding: 10px 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
        .status-box.listening { background: rgba(0,255,0,0.2); border: 1px solid #0f0; }
        .status-box.stopped { background: rgba(255,0,0,0.2); border: 1px solid #f00; }
        .status-box.info { background: rgba(0,150,255,0.2); border: 1px solid #09f; }
        
        /* Transcript Display */
        .transcript-box {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            min-height: 60px;
            font-size: 0.85rem;
            color: #ccc;
            max-height: 100px;
            overflow-y: auto;
        }
        .transcript-word { display: inline; }
        .transcript-word.target { color: #ffd700; font-weight: bold; }
        
        /* Settings */
        .settings-section {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-label { font-size: 0.9rem; }
        input[type="text"], input[type="number"], select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            font-size: 0.9rem;
            width: 120px;
        }
        
        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
        }
        .btn-primary:hover { transform: scale(1.02); }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
        }
        
        /* Detection Mode Toggle */
        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: rgba(255,215,0,0.3);
            border: 2px solid #ffd700;
        }
        .mode-btn:not(.active) {
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
        }
        
        /* Debug Log */
        .debug-section {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            color: #0f0;
        }
        .debug-line { margin: 2px 0; }
        .debug-line.error { color: #f00; }
        .debug-line.word { color: #ffd700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🙏 Japa Mala Counter</h1>
        
        <!-- Counter Display -->
        <div class="counter-section">
            <div class="mala-count" id="malaCount">0</div>
            <div class="word-count"><span id="wordCount">0</span> / <span id="wordsPerMala">8</span> words</div>
            <div class="mantra-progress" id="beadProgress"></div>
            <div class="audio-level">
                <div class="audio-level-bar" id="audioLevel"></div>
            </div>
        </div>
        
        <!-- Status -->
        <div class="status-box info" id="statusBox">Ready to start</div>
        
        <!-- Transcript -->
        <div class="transcript-box" id="transcript">Speech will appear here...</div>
        
        <!-- Detection Mode -->
        <div class="mode-toggle">
            <div class="mode-btn active" id="modeHybrid" onclick="setMode('hybrid')">🔀 Hybrid<br><small>Speech + Audio</small></div>
            <div class="mode-btn" id="modeSpeech" onclick="setMode('speech')">🎤 Speech Only<br><small>Google STT</small></div>
            <div class="mode-btn" id="modeAudio" onclick="setMode('audio')">📊 Audio Only<br><small>Energy Detection</small></div>
        </div>
        
        <!-- Settings -->
        <div class="settings-section">
            <div class="setting-row">
                <span class="setting-label">Target Word</span>
                <input type="text" id="targetWord" value="hare" placeholder="hare">
            </div>
            <div class="setting-row">
                <span class="setting-label">Words per Mala</span>
                <input type="number" id="wordsPerMalaInput" value="8" min="1" max="108">
            </div>
            <div class="setting-row">
                <span class="setting-label">Language</span>
                <select id="language">
                    <option value="hi-IN">Hindi</option>
                    <option value="sa-IN">Sanskrit</option>
                    <option value="en-IN">English (India)</option>
                    <option value="en-US">English (US)</option>
                </select>
            </div>
            <div class="setting-row">
                <span class="setting-label">Alarm at Mala #</span>
                <input type="number" id="alarmAt" value="16" min="1">
            </div>
        </div>
        
        <!-- Control Buttons -->
        <button class="btn btn-primary" id="startBtn" onclick="startCounting()">▶️ Start Counting</button>
        <button class="btn btn-danger" id="stopBtn" onclick="stopCounting()" style="display:none;">⏹️ Stop</button>
        <button class="btn btn-secondary" onclick="resetCounter()">🔄 Reset Counter</button>
        <button class="btn btn-secondary" onclick="manualCount()">👆 Manual Count (+1 word)</button>
        
        <!-- Debug Log -->
        <div class="debug-section" id="debugLog"></div>
    </div>

    <script>
        // ============================================
        // STATE VARIABLES
        // ============================================
        let isRunning = false;
        let malaCount = 0;
        let wordCount = 0;
        let wordsPerMala = 8;
        let targetWord = 'hare';
        let detectionMode = 'hybrid'; // hybrid, speech, audio
        
        // Audio detection state
        let audioContext = null;
        let analyser = null;
        let mediaStream = null;
        let audioDetectionInterval = null;
        let lastAudioPeakTime = 0;
        let energyHistory = [];
        const ENERGY_HISTORY_SIZE = 20;
        let noiseFloor = 0;
        let adaptiveThreshold = 0;
        
        // Speech recognition state
        let speechActive = false;
        let speechWordCount = 0;
        let audioWordCount = 0;
        
        // Deduplication
        let lastCountTime = 0;
        const DEBOUNCE_MS = 200;
        
        // ============================================
        // INITIALIZATION
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            initBeadProgress();
            loadSettings();
            log('App initialized - Hybrid detection ready');
        });
        
        function initBeadProgress() {
            const container = document.getElementById('beadProgress');
            container.innerHTML = '';
            for (let i = 0; i < wordsPerMala; i++) {
                const bead = document.createElement('div');
                bead.className = 'bead';
                bead.id = 'bead' + i;
                container.appendChild(bead);
            }
        }
        
        function loadSettings() {
            wordsPerMala = parseInt(localStorage.getItem('wordsPerMala') || '8');
            targetWord = localStorage.getItem('targetWord') || 'hare';
            document.getElementById('wordsPerMalaInput').value = wordsPerMala;
            document.getElementById('wordsPerMala').textContent = wordsPerMala;
            document.getElementById('targetWord').value = targetWord;
            initBeadProgress();
        }
        
        function saveSettings() {
            wordsPerMala = parseInt(document.getElementById('wordsPerMalaInput').value) || 8;
            targetWord = document.getElementById('targetWord').value.toLowerCase().trim() || 'hare';
            localStorage.setItem('wordsPerMala', wordsPerMala);
            localStorage.setItem('targetWord', targetWord);
            document.getElementById('wordsPerMala').textContent = wordsPerMala;
            initBeadProgress();
        }
        
        // ============================================
        // MODE SELECTION
        // ============================================
        function setMode(mode) {
            detectionMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('mode' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
            log('Detection mode: ' + mode);
        }
        
        // ============================================
        // START/STOP COUNTING
        // ============================================
        async function startCounting() {
            saveSettings();
            isRunning = true;
            speechWordCount = 0;
            audioWordCount = 0;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            setStatus('Starting...', 'info');
            
            try {
                // Start based on mode
                if (detectionMode === 'hybrid' || detectionMode === 'speech') {
                    startSpeechRecognition();
                }
                if (detectionMode === 'hybrid' || detectionMode === 'audio') {
                    await startAudioDetection();
                }
                
                setStatus('🎧 Listening for "' + targetWord + '"...', 'listening');
                log('Counting started in ' + detectionMode + ' mode');
            } catch (err) {
                log('Error starting: ' + err.message, 'error');
                setStatus('Error: ' + err.message, 'stopped');
                stopCounting();
            }
        }
        
        function stopCounting() {
            isRunning = false;
            
            // Stop speech recognition
            if (typeof NativeApp !== 'undefined' && NativeApp.stopSpeechRecognition) {
                NativeApp.stopSpeechRecognition();
            }
            
            // Stop audio detection
            stopAudioDetection();
            
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            setStatus('Stopped', 'stopped');
            log('Counting stopped');
        }
        
        // ============================================
        // SPEECH RECOGNITION (Native Android)
        // ============================================
        function startSpeechRecognition() {
            const language = document.getElementById('language').value;
            
            if (typeof NativeApp !== 'undefined' && NativeApp.startSpeechRecognition) {
                NativeApp.startSpeechRecognition(targetWord, language);
                speechActive = true;
                log('Speech recognition started (lang: ' + language + ')');
            } else {
                log('Native speech recognition not available', 'error');
            }
        }
        
        // Callbacks from Native Android
        function onSpeechReady() {
            log('Speech recognizer ready');
        }
        
        function onSpeechError(error) {
            log('Speech error: ' + error, 'error');
        }
        
        function onWordDetected(word) {
            if (!isRunning) return;
            
            // Debounce
            const now = Date.now();
            if (now - lastCountTime < DEBOUNCE_MS) {
                log('Debounced word (too fast)');
                return;
            }
            
            lastCountTime = now;
            speechWordCount++;
            incrementWordCount('speech');
            log('✓ WORD DETECTED (speech): ' + word, 'word');
        }
        
        function onTranscript(data) {
            const [text, type] = data.split('|');
            const transcriptEl = document.getElementById('transcript');
            
            // Highlight target words
            const highlighted = text.split(/\s+/).map(word => {
                const clean = word.toLowerCase().replace(/[^a-z]/g, '');
                if (isTargetWord(clean)) {
                    return '<span class="transcript-word target">' + word + '</span>';
                }
                return '<span class="transcript-word">' + word + '</span>';
            }).join(' ');
            
            transcriptEl.innerHTML = highlighted;
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }
        
        function onAudioLevel(level) {
            const normalized = Math.min(100, Math.max(0, (parseFloat(level) + 2) * 10));
            document.getElementById('audioLevel').style.width = normalized + '%';
        }
        
        function isTargetWord(word) {
            if (word === targetWord) return true;
            
            // Variations
            if (targetWord === 'hare') {
                return ['hare', 'haray', 'hari', 'harey', 'hary', 'harry', 'hurry', 'are', 'har'].includes(word);
            }
            if (targetWord === 'krishna') {
                return ['krishna', 'krishn', 'krsna', 'krishan', 'krushna'].includes(word);
            }
            if (targetWord === 'rama') {
                return ['rama', 'ram', 'raam'].includes(word);
            }
            return false;
        }
        
        // ============================================
        // AUDIO ENERGY DETECTION (Backup/Hybrid)
        // ============================================
        async function startAudioDetection() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(mediaStream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512;
                analyser.smoothingTimeConstant = 0.3;
                source.connect(analyser);
                
                // Reset detection state
                energyHistory = [];
                noiseFloor = 0;
                adaptiveThreshold = 0;
                
                // Start detection loop
                audioDetectionInterval = setInterval(detectAudioPeaks, 50);
                log('Audio detection started');
            } catch (err) {
                log('Audio detection error: ' + err.message, 'error');
                throw err;
            }
        }
        
        function stopAudioDetection() {
            if (audioDetectionInterval) {
                clearInterval(audioDetectionInterval);
                audioDetectionInterval = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
        }
        
        function detectAudioPeaks() {
            if (!analyser || !isRunning) return;
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            
            // Calculate energy in speech frequency range (300Hz - 3000Hz)
            const sampleRate = audioContext.sampleRate;
            const binSize = sampleRate / analyser.fftSize;
            const lowBin = Math.floor(300 / binSize);
            const highBin = Math.min(Math.floor(3000 / binSize), dataArray.length);
            
            let energy = 0;
            for (let i = lowBin; i < highBin; i++) {
                energy += dataArray[i] * dataArray[i];
            }
            energy = Math.sqrt(energy / (highBin - lowBin));
            
            // Update energy history
            energyHistory.push(energy);
            if (energyHistory.length > ENERGY_HISTORY_SIZE) {
                energyHistory.shift();
            }
            
            // Calculate adaptive threshold
            if (energyHistory.length >= 5) {
                const sorted = [...energyHistory].sort((a, b) => a - b);
                noiseFloor = sorted[Math.floor(sorted.length * 0.2)]; // 20th percentile
                const peak = sorted[Math.floor(sorted.length * 0.9)]; // 90th percentile
                adaptiveThreshold = noiseFloor + (peak - noiseFloor) * 0.5;
            }
            
            // Detect peak (word onset)
            const now = Date.now();
            const MIN_WORD_GAP = 180; // Minimum ms between words
            
            if (energy > adaptiveThreshold && energy > noiseFloor * 1.5) {
                if (now - lastAudioPeakTime > MIN_WORD_GAP) {
                    lastAudioPeakTime = now;
                    
                    // Only count if in audio-only mode, or if speech hasnt counted recently
                    if (detectionMode === 'audio') {
                        // In audio-only mode, always count
                        incrementWordCount('audio');
                        audioWordCount++;
                        log('✓ WORD DETECTED (audio energy)', 'word');
                    } else if (detectionMode === 'hybrid') {
                        // In hybrid mode, only count if speech didnt catch it
                        // Use a longer debounce window for hybrid
                        if (now - lastCountTime > DEBOUNCE_MS * 2) {
                            // Speech might have missed this one
                            // Dont count - let speech handle it primarily
                            // This prevents double-counting
                        }
                    }
                }
            }
        }
        
        // ============================================
        // WORD COUNTING LOGIC
        // ============================================
        function incrementWordCount(source) {
            wordCount++;
            updateDisplay();
            
            // Vibrate
            if (typeof NativeApp !== 'undefined' && NativeApp.vibrate) {
                NativeApp.vibrate(50);
            }
            
            // Check mala completion
            if (wordCount >= wordsPerMala) {
                completeMala();
            }
        }
        
        function completeMala() {
            malaCount++;
            wordCount = 0;
            updateDisplay();
            
            // Longer vibration for mala completion
            if (typeof NativeApp !== 'undefined' && NativeApp.vibrate) {
                NativeApp.vibrate(300);
            }
            
            log('🔔 MALA ' + malaCount + ' COMPLETE!', 'word');
            
            // Check alarm
            const alarmAt = parseInt(document.getElementById('alarmAt').value);
            if (malaCount >= alarmAt) {
                playAlarm();
            }
        }
        
        function updateDisplay() {
            document.getElementById('malaCount').textContent = malaCount;
            document.getElementById('wordCount').textContent = wordCount;
            
            // Update beads
            for (let i = 0; i < wordsPerMala; i++) {
                const bead = document.getElementById('bead' + i);
                if (bead) {
                    bead.classList.toggle('active', i < wordCount);
                }
            }
        }
        
        function manualCount() {
            if (!isRunning) {
                // Allow manual counting even when not running
            }
            incrementWordCount('manual');
            log('Manual count added');
        }
        
        function resetCounter() {
            malaCount = 0;
            wordCount = 0;
            speechWordCount = 0;
            audioWordCount = 0;
            updateDisplay();
            log('Counter reset');
        }
        
        // ============================================
        // ALARM
        // ============================================
        function playAlarm() {
            log('🎉 ALARM! Target malas reached!', 'word');
            if (typeof NativeApp !== 'undefined' && NativeApp.showToast) {
                NativeApp.showToast('🎉 Congratulations! You completed ' + malaCount + ' malas!');
            }
            // Multiple vibrations
            if (typeof NativeApp !== 'undefined' && NativeApp.vibrate) {
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => NativeApp.vibrate(500), i * 700);
                }
            }
        }
        
        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function setStatus(text, type) {
            const el = document.getElementById('statusBox');
            el.textContent = text;
            el.className = 'status-box ' + type;
        }
        
        function log(message, type = '') {
            console.log('[JapaMala] ' + message);
            const debugLog = document.getElementById('debugLog');
            const line = document.createElement('div');
            line.className = 'debug-line ' + type;
            line.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            debugLog.appendChild(line);
            debugLog.scrollTop = debugLog.scrollHeight;
            
            // Keep log size manageable
            while (debugLog.children.length > 50) {
                debugLog.removeChild(debugLog.firstChild);
            }
            
            if (typeof NativeApp !== 'undefined' && NativeApp.log) {
                NativeApp.log(message);
            }
        }
        
        // Bluetooth callbacks
        function onBtScoConnected() { log('Bluetooth SCO connected'); }
        function onBtScoDisconnected() { log('Bluetooth SCO disconnected'); }
        function onNativePlaybackComplete() { log('Playback complete'); }
        function onNativePlaybackError(err) { log('Playback error: ' + err, 'error'); }
    </script>
</body>
</html>
